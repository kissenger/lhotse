###########################
# SNORKELOLOGY PUBLIC
#    - snorkelology.co.uk (cached)
#    - beta.snorkelology.co.uk (no cache)
###########################

server {
   listen 443 ssl http2;
   listen [::]:443 ssl http2;
   server_name snorkelology.co.uk beta.snorkelology.co.uk;

   # Bad Bots Denial
   if ($http_user_agent ~* (Bytespider|ClaudeBot|DotBot|SemrushBot)) {
      return 403;
   }

   ssl_certificate_key /etc/letsencrypt/live/snorkelology.co.uk/privkey.pem; # managed by Certbot
   ssl_certificate /etc/letsencrypt/live/snorkelology.co.uk/fullchain.pem; # managed by Certbot

   # Common static files
   location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|webp|avif)$ {
      access_log off;
      add_header Cache-Control $snorkel_static_cache_control always;
      add_header X-Cache-Status $snorkel_cache_status_header always;
      proxy_pass http://$snorkel_backend;
      include snippets/security-headers.conf;
   }

   location / {
      # 1. PROXY CACHE SETTINGS
      proxy_cache my_cache;
      proxy_cache_valid 404 1m;
      proxy_cache_valid 200 302 60m;
      proxy_cache_background_update on;

      # 2. HIGH AVAILABILITY (Stale Serving)
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;

      # 3. CACHE BYPASS
      # Normal host: bypass when logged-in cookie exists.
      # Beta host: forced bypass and no-store.
      proxy_cache_bypass $snorkel_cache_bypass;
      proxy_no_cache $snorkel_cache_bypass;

      # 4. SECURITY & PERFORMANCE HEADERS
      include snippets/security-headers.conf;
      add_header X-Cache-Status $snorkel_cache_status_header always;
      add_header Cache-Control $snorkel_dynamic_cache_control always;

      # 5. BACKEND PROXY LOGIC
      proxy_pass http://$snorkel_backend;
      include snippets/proxy-headers.conf;

      # 6. Optimisation for large assets
      proxy_buffer_size 16k;
      proxy_buffers 8 16k;
      proxy_busy_buffers_size 32k;

      client_max_body_size 50M;
   }

   # HONEYPOT
   location ~* /(wp-admin|admin|phpmyadmin|setup\.php|\.env) {
      access_log /var/log/nginx/bot_traps.log custom_log;
      return 444;
   }
}
