###########################
# SNORKELOLOGY ADMIN
#    - admin.snorkelology.co.uk
###########################

server {
   listen 443 ssl http2;
   listen [::]:443 ssl http2;
   server_name admin.snorkelology.co.uk;

   # Bad Bots Denial
   if ($http_user_agent ~* (Bytespider|ClaudeBot|DotBot|SemrushBot)) {
      return 403;
   }

   ssl_certificate /etc/letsencrypt/live/snorkelology.co.uk/fullchain.pem; # managed by Certbot
   ssl_certificate_key /etc/letsencrypt/live/snorkelology.co.uk/privkey.pem; # managed by Certbot

   location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|webp|avif)$ {
      # Prevent stale chunk 404s from being cached at proxy/edge for admin host.
      proxy_cache off;
      proxy_no_cache 1;
      proxy_cache_bypass 1;

      add_header Cache-Control "private, no-store, no-cache, max-age=0, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      add_header X-Cache-Status BYPASS always;
      access_log off;
      proxy_pass http://192.168.1.136:4000;
      include snippets/proxy-headers.conf;
      include snippets/security-headers.conf;
   }

   location / {
      include snippets/security-headers.conf;

      # Admin should never be cached by nginx proxy cache
      proxy_cache off;
      proxy_no_cache 1;
      proxy_cache_bypass 1;

      # Guard against large upstream headers
      proxy_buffer_size 16k;
      proxy_buffers 8 16k;
      proxy_busy_buffers_size 32k;

      # Explicit no-store for all admin responses
      add_header Cache-Control "private, no-store, no-cache, max-age=0, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      add_header X-Cache-Status BYPASS always;

      proxy_pass http://192.168.1.136:4000;
      include snippets/proxy-headers.conf;

      client_max_body_size 50M;
   }

   # HONEYPOT (safe pattern: won't match /adminmap)
   location ~* ^/(wp-admin(?:/|$)|phpmyadmin(?:/|$)|setup\.php$|\.env$) {
      access_log /var/log/nginx/bot_traps.log custom_log;
      return 444;
   }
}
