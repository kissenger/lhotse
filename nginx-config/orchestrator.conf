# Paste this block inside the `http { ... }` context of your global nginx config.
# It wires the snorkelology/practicenight split config in a deterministic order.
#
# IMPORTANT:
# - If your deployed path differs, update `/etc/nginx/nginx_config/...` below.
# - Ensure this block is loaded before any broad `include .../*.conf;` that might
#   also match these same files.

# Upstreams for host-based backend routing (prod/beta isolation).
upstream snorkelology_prod_backend {
   server 192.168.1.136:4000;
   keepalive 64;
}

upstream snorkelology_beta_backend {
   server 192.168.1.136:4001;
   keepalive 64;
}

# Host -> upstream name (used by proxy_pass http://$snorkel_backend;)
map $host $snorkel_backend {
   default snorkelology_prod_backend;
   beta.snorkelology.co.uk snorkelology_beta_backend;
}

# Explicit cache-bypass flags.
map $http_cookie $snorkel_has_cookie {
   default 1;
   "" 0;
}

map $host $snorkel_force_bypass {
   default 0;
   beta.snorkelology.co.uk 1;
}

map $snorkel_force_bypass:$snorkel_has_cookie $snorkel_cache_bypass {
   default 0;
   "0:1" 1;
   "1:0" 1;
   "1:1" 1;
}

# Host-specific response cache headers.
map $host $snorkel_dynamic_cache_control {
   default "no-cache, public, must-revalidate";
   beta.snorkelology.co.uk "private, no-store, no-cache, must-revalidate, max-age=0";
}

map $host $snorkel_static_cache_control {
   default "public, no-transform, immutable, max-age=31536000";
   beta.snorkelology.co.uk "private, no-store, no-cache, must-revalidate, max-age=0";
}

map $host $snorkel_cache_status_header {
   default $upstream_cache_status;
   beta.snorkelology.co.uk "BYPASS";
}

# Server blocks (ordered explicitly).
include /etc/nginx/nginx_config/00-http-to-https.conf;
include /etc/nginx/nginx_config/10-www-snorkelology-redirect.conf;
include /etc/nginx/nginx_config/11-www-practicenight-redirect.conf;
include /etc/nginx/nginx_config/12-www-beta-redirect.conf;
include /etc/nginx/nginx_config/20-snorkelology-public.conf;
include /etc/nginx/nginx_config/30-snorkelology-admin.conf;
include /etc/nginx/nginx_config/40-practicenight.conf;
