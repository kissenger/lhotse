<div class="loader-container">
  @if (loadingState === 'loading') {
    <div class="loader"></div>
  } @else {
    <div class="error-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#1D3D59" stroke-width="1.5" fill="none"/>
        <line x1="12" y1="7" x2="12" y2="13" stroke="#1D3D59" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="16.5" r="1" fill="#1D3D59"/>
      </svg>
      <p>Something went wrong loading this content</p>
      <button (click)="retry.emit()">Try again</button>
    </div>
  }
</div>
