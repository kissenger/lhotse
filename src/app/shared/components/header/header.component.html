<header>

  <div class="header-main">

    <a #brandbox class="brand-box block-animation" href="/" [ngClass]="expandDropdownMenu ? 'expand' : 'contract'" (click)="onMenuItemClick()" aria-label="Visit Snorkelology home page">
      <img src="./assets/banner/snround.webp" width="100" height="100" alt="Snorkelology logo" (load)="onLogoLoad()" [class.logo-hidden]="!logoLoaded">
    </a>

    <div class="menubar">

      <div class="menu-row">

      <svg id="hamburger" class="hamburger" viewBox="-53 -53 106 106" height="40px" width="40px" fill=var(--sn-colour) (click)="onHamburgerClick()">
        <rect x="-50" y="-50" width="100" height="100" fill=var(--sn-colour) rx="10" stroke="#FFFFFF" stroke-width="6">
          <animate #animate begin="click" id="startAnimation" />
        </rect>
        <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#FFFFFF" stroke-width="6" opacity="1" stroke-linecap="round" pointer-events="none">
          <animate #animate attributeName="y2" from="20" to="-20" dur="0.3s" begin="startAnimation.begin" fill="freeze"></animate>
        </line>
        <line x1="-20" y1="0" x2="20" y2="0" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" pointer-events="none">
          <animate #animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="startAnimation.begin" fill="freeze"></animate>
        </line>
        <line x1="-20" y1="20" x2="20" y2="20" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" pointer-events="none">
          <animate #animate attributeName="y2" from="-20" to="20" dur="0.3s" begin="startAnimation.begin" fill="freeze"></animate>
        </line>
      </svg>

      <ul class="menu" [ngClass]="expandDropdownMenu ? 'show' : ''" (click)="onMenuItemClick()">
        @for (menuItem of menuItems; track menuItem) {
          <li #menuItem [routerLink]="'.'" [fragment]="menuItem.anchor" [ngClass]="{'active': activeMenuItem == menuItem.name}">
            <span class="stealth-html-link">{{menuItem.name}}</span>
          </li>          
        }
      </ul>
      
      <div class="socials">
        <a class="suppress-external-link" href="https://www.youtube.com/@snorkelology" target="_blank" rel="noopener noreferrer" aria-label="See Snorkelology videos on Youtube">
          <app-svg-youtube theme="lightOnDark" alt="See Snorkelology videos on Youtube"></app-svg-youtube>
        </a>

        <a class="suppress-external-link" href="https://www.facebook.com/snorkelology" target="_blank" rel="noopener noreferrer" aria-label="Find Snorkelology on Facebook">
          <app-svg-facebook theme="lightOnDark" alt="Find Snorkelology on Facebook"></app-svg-facebook>
        </a>

        <a class="suppress-external-link" href="https://www.instagram.com/snorkelology/" target="_blank" rel="noopener noreferrer" aria-label="Find Snorkelology on Instagram">
          <app-svg-instagram theme="lightOnDark" alt="See Snorkelology on Instagram"></app-svg-instagram>
        </a>

        <a class="suppress-external-link" href="&#109;&#97;&#105;&#108;&#116;&#111;&#58;%68%65%6C%6C%6F%40%73%6E%6F%72%6B%65%6C%6F%6C%6F%67%79%2E%63%6F%2E%75%6B" aria-label="Send Snorkelology an email">
          <app-svg-email theme="lightOnDark" alt="Send Snorkelology an email"></app-svg-email>
        </a>
      </div>

      </div><!-- end menu-row -->

      @if (isAdminRoute) {
        <nav class="admin-breadcrumb">
          @for (crumb of breadcrumbs; track crumb.path; let last = $last) {
            @if (!last) {
              <a [href]="crumb.path">{{ crumb.label }}</a>
              <span class="sep">›</span>
            } @else {
              <span class="current">{{ crumb.label }}</span>
            }
          }
        </nav>
      }

    </div>

  </div>

</header>
