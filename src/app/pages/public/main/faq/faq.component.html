
<div class="dynamic-container">

  <p>{{ pageDescription }}</p>

  @for (section of faqSections; track section.title) {
    <h2 class="faq-section-heading" [id]="faqFragment(section.title)">{{ section.title }}</h2>

    @for (faq of section.faqs; track faq.question) {
      <h3 class="faq-question" [id]="faqFragment(faq.question)">{{ faq.question }}</h3>
      <div class="faq-answer" [innerHTML]="faq.answer | htmler"></div>
    }
  }
  
</div>
