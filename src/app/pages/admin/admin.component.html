<div class="admin-dashboard">

  <div class="dashboard-header">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" (click)="onLogout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>

  <div class="card-grid">

    <a class="card" routerLink="/blogeditor">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div class="card-body">
        <h2>Blog Editor</h2>
        <p>Write and manage blog posts</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card" routerLink="/featureseditor">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      </div>
      <div class="card-body">
        <h2>Features Editor</h2>
        <p>Add and edit snorkel sites</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card" routerLink="/adminmap">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      </div>
      <div class="card-body">
        <h2>Admin Map</h2>
        <p>View all sites by visit status</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

    <a class="card" routerLink="/orders">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </div>
      <div class="card-body">
        <h2>Orders</h2>
        <p>Review and manage shop orders</p>
      </div>
      <div class="card-arrow">›</div>
    </a>

  </div>

</div>
