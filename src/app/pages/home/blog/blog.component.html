<!-- @defer { -->

  <div class="dynamic-container">

    <h2 class="section-heading">{{ pageHeading }}</h2>

    <p>{{ pageDescription }}</p>
    <div class="filter-bar">
      <span class="filter-label">{{ filterLabel }}</span>
      <div class="filter-chips">
        @for (kw of uniqueKeywords; track kw) {
          <button class="chip" [class.active]="selectedKeywords.includes(kw)" (click)="onFilter(kw)">{{kw}}</button>
        }
      </div>
      <div class="filter-actions">
        <button class="filter-action" (click)="selectAll()">Select all</button>
        <button class="filter-action" (click)="selectNone()">Clear all</button>
      </div>
    </div>
  </div>

  <div class="browser-container">

    @if (loadingState !== 'success') {
      <app-loader [loadingState]="loadingState" (retry)="onRetry()"></app-loader>

    } @else {
      <div #browser class="browser dynamic-container">
        @for (post of filteredPosts; track post) {
          <app-blog-card [data]="post"></app-blog-card>
        } @empty {
          <div class="no-results">
            <p>No articles match the selected keywords.</p>
            <button class="filter-action" (click)="selectAll()">Show all articles</button>
          </div>
        }
      </div>

      <div #arrows class="arrow left">
        <app-svg-arrow direction="left"  (click)="onClickLeft()"></app-svg-arrow>
      </div>
      <div #arrows class="arrow right">
        <app-svg-arrow direction="right" (click)="onClickRight()"></app-svg-arrow>
      </div>

    }

  </div>
<!-- } -->
